<!-- declare html doc type -->
<!DOCTYPE html>

<!-- declare language -->
<html lang="en">

<!-- declare head, Claude assisted for character encoding and viewport settings -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Keyboard - Sender</title>
    <link rel="stylesheet" href="style.css">
</head>

<!-- declare body with sender box -->
<body>
    <h1>Quest Keyboard</h1>

    <div id="sender-box">
      <input
        type="text"
        id="text-input"
        placeholder="Type something..."
        autocomplete="off"
      />
    </div>

    <!-- include socket logic -->
    <script src="socket.js"></script>
    <!-- logic behind text input -->
    <script>
      // connect to websocket server
      connect();
      
      // get reference to text input and listen for keyup events
      const input = document.getElementById('text-input');

      input.addEventListener('keyup', function () {
        const message = input.value;
        if (socket.readyState === WebSocket.OPEN) {
          socket.send(message);
          console.log('Message', message, 'sent to server');
        } else {
          console.log('WebSocket is not open. Ready state:', socket.readyState);
        }
      });

      // TODO: clear input on focus to prevent stale messages
    </script>
</body>
</html>
