<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Keyboard - Sender</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <h1>Quest Keyboard</h1>

    <div id="sender-box">
        <textarea
            id="text-input"
            placeholder="Type something..."
            autocomplete="off"
            autocorrect="on"
            rows="1"
        ></textarea>
        <button id="clear-button">Clear</button>
    </div>
    <div class="nav-bar">
        <a href="/receiver" class="btn-nav">Switch to Receiver</a>
        <a href="/logout" class="btn-nav">Logout</a>
    </div>

    <script src="/socket.js"></script>
    <script>
        connect();

        const input = document.getElementById('text-input');

        // auto-grow the textarea and send on every keystroke
        input.addEventListener('input', function() {
            input.style.height = '0px';
            input.style.height = input.scrollHeight + 'px';
            sendMessage(input.value);
        });

        document.getElementById('clear-button').addEventListener('click', clearInput);

        // escape key clears the input without reaching for the button
        input.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') clearInput();
        });

        function sendMessage(message) {
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(message);
            } else {
                console.log('WebSocket not open. Ready state:', socket.readyState);
            }
        }

        // reset the textarea and tell the receiver to clear its display
        function clearInput() {
            input.value = '';
            input.style.height = '0px';
            input.style.height = input.scrollHeight + 'px';
            sendMessage('');
        }
    </script>
</body>
</html>
