<!-- declare html doc type -->
<!DOCTYPE html>

<!-- declare language -->
<html lang="en">

<!-- declare head, Claude assisted for character encoding and viewport settings -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Keyboard - Sender</title>
    <link rel="stylesheet" href="/style.css">
</head>

<!-- declare body with sender box -->
<body>
    <h1>Quest Keyboard</h1>

    <div id="sender-box">
      <textarea
      id="text-input"
      placeholder="Type something..."
      autocomplete="off"
      autocorrect="on"
      rows="1"
    ></textarea>
      <button id="clear-button">Clear</button>
    </div>
    <div class="nav-bar">
      <a href="/receiver" class="btn-nav">Switch to Receiver</a>
      <a href="/logout" class="btn-nav">Logout</a>
    </div>

    <!-- include socket logic -->
    <script src="/socket.js"></script>
    <!-- logic behind text input -->
    <script>
      // connect to websocket server
      connect();
      
      // get reference to text input and listen for keyup events
      const input = document.getElementById('text-input');
      input.addEventListener('input', function () {
        input.style.height = '0px';
        input.style.height = input.scrollHeight + 'px';
        sendMessage(input.value);
      });

      // clear button logic
      const clearButton = document.getElementById('clear-button');
      clearButton.addEventListener('click', clearInput);

      // listen for escape key to clear input
      input.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') {
          clearInput();
        }
      });

      // function to send message
      function sendMessage(message) {
        if (socket.readyState === WebSocket.OPEN) {
          socket.send(message);
          console.log('Message', message, 'sent to server');
        } else {
          console.log('WebSocket is not open. Ready state:', socket.readyState);
        }
      }

      // clear input to prevent stale messages
      function clearInput() {
        input.value = '';
        input.style.height = '0px';
        input.style.height = input.scrollHeight + 'px';
        sendMessage(''); // send empty message to clear display on Quest
      }
    </script>
</body>
</html>
