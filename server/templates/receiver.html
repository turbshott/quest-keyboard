<!-- declare html doc type -->
<!DOCTYPE html>

<!-- declare language -->
<html lang="en">

<!-- declare head, Claude assisted for character encoding and viewport settings -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest Keyboard - Receiver</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <h1>Quest Keyboard</h1>

    <div id="receiver-box">
      <p id="received-text"></p>
    </div>
    <div class="nav-bar">
        <a href="/sender" class="btn-nav">Switch to Sender</a>
        <a href="/logout" class="btn-nav">Logout</a>
    </div>

    <!-- include socket logic -->
    <script src="/socket.js"></script>
    <!-- logic to display received messages -->
    <script>
        const receivedText = document.getElementById('received-text');

        const waitingTimeout = setTimeout(function() {
        if (receivedText.textContent === '') {
            receivedText.classList.remove('fade-in');
            // force browser to reflow so removing and adding the class is registered
            void receivedText.offsetWidth;
            receivedText.classList.add('fade-in');
            receivedText.textContent = 'Waiting for messages...';
        }
        }, 500);

        connect( function(event) {
            clearTimeout(waitingTimeout);
            if (event.data === '') {
                receivedText.textContent = 'Waiting for messages...';
            } else {
                receivedText.classList.remove('fade-in');
                console.log('Message received from server:', event.data);
                receivedText.textContent = event.data;
            }
        });
    </script>
</body>
</html>
